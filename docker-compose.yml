services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${MULLVAD_WG_KEY}
      - WIREGUARD_ADDRESSES=${MULLVAD_WG_ADDR}
      - SERVER_COUNTRIES=${VPN_COUNTRY:-Netherlands}

  worker:
    build: .
    container_name: js-worker
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./targets:/app/targets
      - ./notify-config.yaml:/root/.config/notify/provider-config.yaml:ro
      - ./waymore.yml:/root/.config/waymore/config.yml:ro
      - ./gitleaks.toml:/app/gitleaks.toml:ro
    command: worker
    restart: unless-stopped

  scheduler:
    build: .
    container_name: js-scheduler
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./targets:/app/targets
      - ./notify-config.yaml:/root/.config/notify/provider-config.yaml:ro
      - ./waymore.yml:/root/.config/waymore/config.yml:ro
      - ./gitleaks.toml:/app/gitleaks.toml:ro
    command: scheduler
    restart: unless-stopped
