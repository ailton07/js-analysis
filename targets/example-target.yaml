enabled: false   # template only — copy this file and set enabled: true

domain: example.com
program: "HackerOne - Example Program"

# Scope filters applied to collected URLs (substring match)
scope:
  - "example.com"

# URLs containing any of these strings are skipped
exclude:
  - "cdn.example.com"
  - "static.third-party.com"

crawl_depth: 2
max_urls: 3000

# schedule: ~               → one-shot: never auto-enqueued, run manually
# schedule: "0 3 * * *"    → recurring nightly at 03:00
# schedule: "0 */6 * * *"  → recurring every 6 hours
schedule: ~

# Send findings to notify (requires notify-config.yaml to be mounted)
notify: true

# Send pipeline progress through notify at each stage (collect / fetch / scan / done)
verbose: false

# Per-target rate limit — overrides global config.yaml fetcher values
# Omit the block entirely (or any individual key) to use the global default
# rate_limit:
#   delay: 1.5          # seconds between requests
#   jitter: 0.5         # random extra delay added per request
#   max_concurrent: 3   # parallel download threads
#   timeout: 15         # per-request timeout (seconds)
#   max_content_mb: 10  # skip files larger than this
